<div class="web-auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>
        <div class="card-title">
          <mat-icon>cloud</mat-icon>
          <span>Authentication</span>
        </div>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>

      <!-- Not Authenticated State -->
      @if (!isAuthenticated) {
        <div class="auth-content">
          <p class="info-text">
            Authentication is required to use the SailPoint UI Development Kit.
          </p>
          @if (errorMessage) {
            <div class="error-message">
              <mat-icon>error</mat-icon>
              <span>{{ errorMessage }}</span>
            </div>
          }
          <button
            mat-raised-button
            color="primary"
            class="auth-button"
            (click)="authenticate()"
            [disabled]="isLoading">
            <div class="button-content">
              @if (!isLoading) {
                <mat-icon>login</mat-icon>
              }
              @if (isLoading) {
                <mat-spinner diameter="20" class="button-spinner"></mat-spinner>
              }
              <span>Authenticate with SailPoint</span>
            </div>
          </button>
        </div>
      }

      <!-- Authenticated State -->
      @if (isAuthenticated) {
        <div class="auth-content authenticated">
          <div class="success-message">
            <mat-icon color="primary">check_circle</mat-icon>
            <span>Successfully authenticated</span>
          </div>
          @if (username) {
            <div class="user-info">
              <mat-icon>account_circle</mat-icon>
              <span>{{ username }}</span>
            </div>
          }
          <button
            mat-raised-button
            color="warn"
            class="logout-button"
            (click)="logout()"
            [disabled]="isLoading">
            <div class="button-content">
              @if (!isLoading) {
                <mat-icon>logout</mat-icon>
              }
              @if (isLoading) {
                <mat-spinner diameter="20" class="button-spinner"></mat-spinner>
              }
              <span>Logout</span>
            </div>
          </button>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
