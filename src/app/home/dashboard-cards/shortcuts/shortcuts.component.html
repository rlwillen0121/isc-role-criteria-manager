<mat-card>
  <mat-card-header>
    <mat-card-title>
      <mat-icon>link</mat-icon>
      Quick Actions & Shortcuts
    </mat-card-title>
    <mat-card-subtitle>Access common tools and features</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div class="shortcuts-container">
      @for (category of shortcutCategories; track category) {
        <div class="category-section">
          <div class="category-header">
            <mat-icon>{{ category.icon }}</mat-icon>
            <h3>{{ category.title }}</h3>
          </div>
          <div class="shortcuts-grid">
            @for (shortcut of category.shortcuts; track shortcut) {
              <button matFab extended class="shortcut-item"
                (click)="onShortcutClick(shortcut)" [matTooltip]="shortcut.label" [attr.aria-label]="shortcut.label">
                <mat-icon>{{ shortcut.icon }}</mat-icon>
                {{shortcut.label}}
              </button>
            }
          </div>
        </div>
      }
    </div>
  </mat-card-content>
</mat-card>
