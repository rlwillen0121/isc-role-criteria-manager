# This is a basic workflow to help you get started with Actions
name: 'Windows Build'

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
permissions:
  contents: read

jobs:
  build:

    # The type of runner that the job will run on
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Enable Windows long paths
      shell: powershell
      run: |
        # Allow paths longer than 260 chars so deeply-nested node_modules trees
        # don't cause EPERM errors when npm tries to clean up after itself.
        Set-ItemProperty `
          -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' `
          -Name 'LongPathsEnabled' `
          -Value 1

    - name: Install Dependencies
      # Redirect the npm cache into the workspace so each run starts with a
      # clean cache directory. The shared C:\npm\cache on Windows runners can
      # accumulate stale tmp files that trigger a known npm/cacache EEXIST bug
      # (https://github.com/npm/cli/issues/7308) — a fresh per-run path avoids it.
      env:
        NPM_CONFIG_CACHE: ${{ github.workspace }}/.npm-cache
      run: npm install

    - name: Install Angular CLI Globally
      run: npm install -g @angular/cli

    - name: Check lint
      run: npm run lint

    - name: Build Component Library
      run: npm run build:components

    - name: Run headless unit test
      run: npm run test

    - name: Run headless e2e test
      run: |
       npm run e2e

    - name: Build the app
      run: npm run electron:build -- --publish=never

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: built-electron-app
        path: release/**