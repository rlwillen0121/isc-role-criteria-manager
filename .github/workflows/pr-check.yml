name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build component library
        run: npm run build:components
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Run unit tests
        run: npm test
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Angular build check
        # --base-href ./ is required for Electron file:// loading.
        # Without it assets are referenced as /main.js (absolute) which
        # fails when the renderer loads index.html from disk.
        run: npx ng build --configuration production --base-href ./
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Compile Electron main process
        run: npm run electron:tsc

      - name: Install Playwright + Electron system deps
        run: |
          npx playwright install chromium --with-deps
          sudo apt-get install -y xvfb libgtk-3-0 libnotify-dev libnss3 libxss1 libasound2 libxtst6

      - name: Bootstrap smoke test (Electron renderer must not be stuck on Loading...)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" npx playwright test -c e2e/playwright.config.ts e2e/main.spec.ts --timeout 90000
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          CI: 'true'
