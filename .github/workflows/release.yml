name: Release

# Triggered by a version tag push (e.g. git tag v1.3.1 && git push --tags).
# Builds unsigned installers on three platforms and attaches them to the
# GitHub Release created by the tag push.
#
# UNSIGNED BINARIES — see RELEASES.md for user-facing Gatekeeper / SmartScreen
# bypass instructions before posting download links publicly.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: '*.AppImage'
          - os: windows-2022
            artifact: '*.exe'
          - os: macos-14
            artifact: '*.dmg'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install platform deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf

      - name: Build unsigned installer
        run: npm run build:publish
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          # No code-signing env vars set → unsigned build

      - name: Generate SHA256SUMS
        shell: bash
        run: sha256sum release/${{ matrix.artifact }} > release/SHA256SUMS

      - name: Upload release asset
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            release/${{ matrix.artifact }}
            release/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
